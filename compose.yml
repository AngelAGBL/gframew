services:
  mongo:
    image: mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: gemini_comments
    volumes:
      - ./mongo:/data/db:z

  gemini:
    build:
      context: .
    image: gframew
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      DOMAINS: localhost
      LANGUAGE: en
      PROXY: "true"  # Habilitado para probar con Node.js
                     # Flow: TCP → PROXY header → TLS → Gemini request
                     # Client certificates (mTLS) are fully supported
    volumes:
      - ./public:/app/public:z
      - ./server.crt:/app/server.crt:z
      - ./server.key:/app/server.key:z
    ports:
      - 1965:1965