services:
  mongo:
    image: mongo
    container_name: gframew-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: gemini_comments
    volumes:
      - ./mongo:/data/db:z

  gframew:
    build:
      context: .
    image: gframew
    container_name: gemini-server
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      DOMAINS: localhost
      LANGUAGE: en
    volumes:
      - ./public:/home/bun/app/public:z
      - ./server.crt:/home/bun/app/server.crt:z
      - ./server.key:/home/bun/app/server.key:z
    ports:
      - 1965:1965

volumes:
  mongo-data:
